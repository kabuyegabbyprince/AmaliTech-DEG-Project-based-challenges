name: Deploy SupportFlow to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'fullstack/SupportFlow-Visual-Builder/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd fullstack/SupportFlow-Visual-Builder && npm install
      
      - name: Build
        run: cd fullstack/SupportFlow-Visual-Builder && npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fullstack/SupportFlow-Visual-Builder/dist
          cname: # Leave empty unless you have a custom domain
