name: Deploy SupportFlow

on:
  push:
    branches:
      - main
    paths:
      - 'fullstack/SupportFlow-Visual-Builder/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: fullstack/SupportFlow-Visual-Builder
        run: npm ci

      - name: Build
        working-directory: fullstack/SupportFlow-Visual-Builder
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fullstack/SupportFlow-Visual-Builder/dist
